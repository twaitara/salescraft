---
deployment:
  tasks:
    # Deploy the contents of public/ into the web root (public_html).
    # $HOME is the cPanel account home; if your host doesn't expand it,
    # replace $HOME with the absolute path, e.g. /home/USERNAME
    - export DEPLOYPATH=$HOME/public_html
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R public/. $DEPLOYPATH/
