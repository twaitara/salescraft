---
deployment:
  tasks:
    # Deploy the contents of public/ into the nineonetwo.online docroot,
    # served at https://nineonetwo.online/salescraft
    # $HOME is the cPanel account home; if your host doesn't expand it,
    # replace $HOME with the absolute path, e.g. /home4/tonyketter
    - export DEPLOYPATH=$HOME/nineonetwo.online/salescraft
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R public/. $DEPLOYPATH/
    # Remove the legacy static page so the server serves index.php, not the old index.html
    - /bin/rm -f $DEPLOYPATH/index.html
